$mainMod = SUPER 

monitor=DP-1,1920x1080@540,0x0,1
monitor=DP-2,1920x1080@240,-1920x0,1

$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher
$browser = firefox

exec-once = waybar
exec-once= hyprpaper

exec-once = [workspace 1 silent] $terminal 
exec-once = [workspace 3 silent] $terminal

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

bind = $mainMod,V,exec,cliphist list | wofi --dmenu | cliphist decode | wl-copy

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = rgba(b3bdddee) rgba(637192ee) 45deg
    col.inactive_border = rgba(151720aa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
     enabled = false
    }

dwindle {
    pseudotile = true 
    preserve_split = true 
}
master {
    new_status = master
}
misc {
    force_default_wallpaper = -1 
    disable_hyprland_logo = false 
}
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 
    repeat_rate = 50
    repeat_delay = 300
}

bind = $mainMod, Return,exec,$terminal
bind = $mainMod,Q,killactive,
bind = $mainMod,M,exit,
bind = $mainMod,Space,exec,wofi --show drun
bind = $mainMod,F,togglefloating,
bind=$mainMod SHIFT,F,fullscreen,
bind =$mainMod,P,pseudo,
bind = $mainMod,J,togglesplit,
bind = $mainMod,B,exec,$browser 
bind = $mainMod,h,movefocus,l
bind = $mainMod,l,movefocus,r
bind = $mainMod,k,movefocus,u
bind = $mainMod,j,movefocus,d
bind = $mainMod,D,exec,vesktop
bind = $mainMod,W,exec,waypaper
bind = $mainMod,N,exec,$terminal -e tmux new-session nvim
bind = $mainMod,S,togglespecialworkspace,magic

bind= $mainMod SHIFT,h,movewindow,l
bind= $mainMod SHIFT,l,movewindow,r
bind= $mainMod SHIFT,k,movewindow,u
bind= $mainMod SHIFT,j,movewindow,d

bind = $mainMod,1,workspace,1
bind = $mainMod,2,workspace,2
bind = $mainMod,3,workspace,3
bind = $mainMod,4,workspace,4
bind = $mainMod,5,workspace,5
bind = $mainMod,6,workspace,6
bind = $mainMod,7,workspace,7
bind = $mainMod,8,workspace,8
bind = $mainMod,9,workspace,9

bind = $mainMod SHIFT,1,movetoworkspace,1
bind = $mainMod SHIFT,2,movetoworkspace,2
bind = $mainMod SHIFT,3,movetoworkspace,3
bind = $mainMod SHIFT,4,movetoworkspace,4
bind = $mainMod SHIFT,5,movetoworkspace,5
bind = $mainMod SHIFT,6,movetoworkspace,6
bind = $mainMod SHIFT,7,movetoworkspace,7
bind = $mainMod SHIFT,8,movetoworkspace,8
bind = $mainMod SHIFT,9,movetoworkspace,9
bind = $mainMod SHIFT,s,movetoworkspace,special::magic


bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}


workspace = 1,monitor:DP-1,default:true
workspace = 2,monitor:DP-2,default:true
